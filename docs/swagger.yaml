openapi: 3.0.0
info:
  title: Event Booking API
  version: 1.0.0

servers:
  - url: http://localhost:5000

paths:
  /events:
    get:
      summary: Get all upcoming events
      responses:
        "200":
          description: List of events

    post:
      summary: Create event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                date:
                  type: string
                capacity:
                  type: integer
      responses:
        "201":
          description: Event created

  /bookings:
    post:
      summary: Book ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                event_id:
                  type: integer
      responses:
        "201":
          description: Booking successful

  /users/{id}/bookings:
    get:
      summary: Get user bookings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User bookings

  /events/{id}/attendance:
    post:
      summary: Mark attendance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                booking_code:
                  type: string
      responses:
        "200":
          description: Attendance marked
